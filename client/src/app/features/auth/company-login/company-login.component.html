<div class="auth-container">
  <div class="auth-card">
    <h2>Company Portal</h2>
    <p>Sign in to manage your company surveys and insights.</p>

    <form  #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      <div class="form-group">
        <label for="email">Work Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="Enter company email"
          #name = 'ngModel'
          required
          ngModel
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="Enter password"
          #name = 'ngModel'
          required
          ngModel
        >
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary login-btn" [disabled]="!loginForm.valid">Sign In to Dashboard</button>
      </div>

      <div class="auth-footer">
        Don't have a company account? <a routerLink="/auth/register-company">Register your company</a>
      </div>
    </form>
  </div>
</div>
