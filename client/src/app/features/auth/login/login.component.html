<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Please enter your details to sign in.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="Enter your email"
          [(ngModel)]="loginData.email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="Enter your password"
          [(ngModel)]="loginData.password"
          required
        >
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary login-btn" [disabled]="!loginForm.valid">Sign In</button>
        
        <div class="divider">
          <span>OR</span>
        </div>

        <button type="button" class="btn-google" (click)="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48" class="google-icon">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.52c0-1.63-.19-3.31-.52-4.92H24v9.06h13.06c-.52 2.65-2.07 4.96-4.43 6.47l7.14 5.54C43.91 36.85 46.98 31.2 46.98 24.52z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.14-5.54c-2.11 1.45-4.88 2.35-8.75 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/auth/sign-up">Sign up</a>
      </div>
    </form>
  </div>
</div>
