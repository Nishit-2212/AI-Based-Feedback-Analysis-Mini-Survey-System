<div class="auth-container">
  <div class="auth-card">
    <h2>Register your Company</h2>
    <p>Create a company workspace to gather feedback and AI insights.</p>

    <form #signUpForm="ngForm" (ngSubmit)="onSubmit(signUpForm)">
      <div class="form-group">
        <label for="yourName">Your Name</label>
        <input 
          type="text" 
          id="yourName" 
          name="name" 
          class="form-control" 
          placeholder="E.g. John Doe"
          #name = 'ngModel'
          required
          ngModel
        >
      </div>

      <div class="form-group">
        <label for="companyName">Company Name</label>
        <input 
          type="text" 
          id="companyName" 
          name="companyName" 
          class="form-control" 
          placeholder="E.g. Acme Corp"
          #companyName = 'ngModel'
          required
          ngModel
        >
      </div>

      <div class="form-group">
        <label for="companyEmail">Company Email</label>
        <input 
          type="email" 
          id="companyEmail" 
          name="email" 
          class="form-control" 
          placeholder="admin@company.com"
          #companyName = 'ngModel'
          required
          ngModel
        >
      </div>

      <div class="form-group" style="display: flex; gap: 16px;">
        <div style="flex: 1;">
          <label for="country">Country</label>
          <input 
            type="text" 
            id="country" 
            name="country" 
            class="form-control" 
            placeholder="E.g. United States"
            #country = 'ngModel'
            required
            ngModel
          >
        </div>
        <div style="flex: 1;">
          <label for="state">State</label>
          <input 
            type="text" 
            id="state" 
            name="state" 
            class="form-control" 
            placeholder="E.g. California"
            #state = 'ngModel'
            required
            ngModel
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="Create a strong password"
          #password = 'ngModel'
          required
          minlength="6"
          ngModel
        >
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary login-btn" [disabled]="!signUpForm.valid">Create Workspace</button>
      </div>

      <div class="auth-footer">
        Already registered? <a routerLink="/auth/company-login">Sign in</a>
      </div>
    </form>
  </div>
</div>
